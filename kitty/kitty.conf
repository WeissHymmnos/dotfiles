# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Base2Tone Motel Dark
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
# 默认稍小，匹配高 DPI
font_size 15
# 备选：0xProtoNerdFontMono 或 Monospace
font_family 0xProtoNerdFontMono
bold_font auto
italic_font auto
bold_italic_font auto
# END_KITTY_FONTS

#### GENERAL (优化)
allow_remote_control yes
copy_on_select yes
click_interval -1.0
# 减少延迟，匹配 Hyprland 动画
repaint_delay 10
sync_to_monitor yes  # Wayland 同步

#### FONT
disable_ligatures cursor
box_drawing_scale 0.1, 0.2, 1.0, 2.0

#### WINDOW 
hide_window_decorations  titlebar-only # 无边框支持
# 紧凑填充
window_padding_width 12
dynamic_background_opacity yes
# 稍高透明，匹配 HyDE 模糊
background_opacity 0.91
# 降低以节省 Fedora GNOME 性能
background_blur 30
remember_window_size yes

#### CURSOR
cursor_blink_interval 		0
cursor_trail 			1
cursor_trail_decay 		0.0 0.3
# cursor_trail_start_threshold 1
detect_urls 			no
mouse_hide_wait 		0.5
#tab bar

#### TAB (HyDE powerline，简约)
tab_bar_edge top
tab_bar_style powerline
# HyDE 常用斜角，非 round
tab_powerline_style slanted
tab_separator " "

#### KEYBINDINGS (HyDE 扩展：主题切换)
include mappings.conf  # 您的自定义键
# 示例 HyDE 键：切换主题 (需 kitten themes)
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+space launch --type=tab kitten themes=tab kitten themes

shell /bin/zsh

