# Tmux Configuration

# -- Core ---------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -s escape-time 10
set -g repeat-time 300
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g focus-events on
set -g set-clipboard on
set -g mouse on
set -g allow-rename off

setw -g mode-keys vi
set -g status-keys vi

# Keep terminal behavior conservative for compatibility.
set -ga terminal-overrides ",xterm-kitty:RGB"

# -- Catppuccin ---------------------------------------------
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_background 'default'
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_pane_status_enabled 'yes'
set -g @catppuccin_pane_border_status 'top'
set -g @catppuccin_pane_default_fill 'number'
if-shell '[ -f ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux ]' 'run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'

# -- General UX ---------------------------------------------
set -g display-panes-time 800

# -- Splits And Windows -------------------------------------
unbind '"'
unbind %
unbind &
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C new-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind A command-prompt -I "#S" "rename-session '%%'"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind e new-window -n tmux-config "vi ~/.config/tmux/tmux.conf"
bind d detach-client
bind D choose-client

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r Left select-pane -L
bind -r Down select-pane -D
bind -r Up select-pane -U
bind -r Right select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind > swap-pane -D
bind < swap-pane -U
bind z resize-pane -Z
bind Space next-layout
bind b select-layout even-horizontal
bind M-b select-layout even-vertical
bind g select-layout main-horizontal
bind M-g select-layout main-vertical
bind o select-pane -t :.+

bind -r n next-window
bind -r p previous-window
bind N command-prompt -I "#W" "new-window -n '%%' -c '#{pane_current_path}'"
bind Tab last-window
bind s choose-tree -Zs
bind w choose-tree -Zw
bind f command-prompt -p "find window" "find-window '%%'"
bind W choose-window
bind 0 select-window -t :=0
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9

bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window
bind & confirm-before -p "Kill session #S? (y/n)" kill-session
bind q display-panes
bind m set -g mouse \; display-message "toggled mouse support"
bind y setw synchronize-panes \; display-message "toggled synchronize-panes"
bind P paste-buffer
bind ] paste-buffer
bind [ copy-mode
bind ? list-keys

# -- Copy Mode ----------------------------------------------
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-line
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# -- Status Line --------------------------------------------
set -g status-position bottom
set -g status-justify left
set -g status-interval 5

set -g status-left-length 100
set -g status-right-length 100

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# -- Plugins ------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Keep TPM optional so tmux still starts if plugins are not installed yet.
if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm'
