# -----------------------------------------------------
# User Preferences (User Overrides)
# -----------------------------------------------------

# === 1. 输入设备配置 (Input) ===
input {
    # 键盘布局
    kb_layout = us
    
    # 键盘映射提示:
    # 你的三键互换(Caps->Esc->Ctrl)建议继续使用 keyd 守护进程处理。
    # Hyprland 的 kb_options 无法实现完美的三键循环互换。
    # kb_options = ctrl:nocaps # 仅作两键交换参考

    # 鼠标/触控板跟随
    follow_mouse = 1

    touchpad {
        # 开启自然滚动 (Mac风格)
        natural_scroll = true
        
        # 禁用“打字时禁用触控板” (防止游戏或操作时冲突)
        disable_while_typing = true
        
        # === 核心设置: 三指拖拽 ===
        # 开启后: 三指在板上移动 = 按住鼠标左键拖动 (选文本/拖窗口)
        # 注意: 这会占用原本的“三指手势”通道
        drag_3fg = true
        
        # 配合拖拽，通常需要开启点击
        tap-to-click = true
    }
    
    # 设置鼠标灵敏度 (-1.0 到 1.0)
    sensitivity = 0 
}

# === 2. 手势配置 (Gestures) ===
gestures {
    # 开启工作区滑动切换
    workspace_swipe = true
    
    # === 核心设置: 四指切换 ===
    # 因为三指被上面的 drag_3fg 占用了，这里必须改为 4 指
    workspace_swipe_fingers = 4
    
    # 滑动距离阈值 (越小越灵敏)
    workspace_swipe_distance = 300
    
    # 是否反转滑动方向
    workspace_swipe_invert = true
    
    # 最小速度阈值
    workspace_swipe_min_speed_to_force = 30
    
    # 取消操作的比率
    workspace_swipe_cancel_ratio = 0.5
    
    # 使得滑动切换更跟手 (1:1 动画)
    workspace_swipe_create_new = true 
    workspace_swipe_forever = true
}

