
# в–Ҳв–‘в–ҲвҖғв–Ҳв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘

env = WALLPAPER_BACKEND,awww

# Input method configuration
env = QT_IM_MODULE,fcitx
env = GTK_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus

# Ensure fcitx5 starts
exec-once = fcitx5 -d --replace

# // в–Ҳв–„в–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# // в–Ҳв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

# дҝ®еӨҚ Super+J е’Ң Super+L (йҮҚжҳ е°„дёә Vim йЈҺж јзӘ—еҸЈеҜјиҲӘ)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# е°ҶеҺҹжңүзҡ„еҶІзӘҒеҠҹиғҪз§»еҠЁеҲ° Super+Alt з»„еҗҲй”®
bind = $mainMod Alt, L, exec, lockscreen.sh
bind = $mainMod Alt, J, togglesplit
bind = $mainMod Alt, K, exec, keyboardswitch.sh # еҺҹ Super+K д№ҹжҳҜй”®зӣҳеҲҮжҚўпјҢзҺ°дёҖе№¶з§»еҠЁ


#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    # kb_layout = us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat 
    # numlock_by_default = true

    # рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}



# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}




# SwayNC Blur Rules
layerrule = blur true,match:namespace swaync-control-center
layerrule = ignore_alpha 0,match:namespace swaync-control-center
layerrule = blur true,match:namespace swaync-notification-window
layerrule = ignore_alpha 0,match:namespace swaync-notification-window
